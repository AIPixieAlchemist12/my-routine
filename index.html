<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Routine ✨">
<title>My Skincare Routine</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #faf7f2;
  --warm-white: #f5f0e8;
  --blush: #e8d5c4;
  --rose: #c4907a;
  --deep-rose: #a06b58;
  --sage: #7a8c7a;
  --gold: #b8965a;
  --text-dark: #2c2420;
  --text-mid: #5a4a42;
  --text-light: #9a8a82;
  --border: rgba(180,150,130,0.18);
  --shadow: rgba(100,60,40,0.07);
  --shadow-lg: rgba(100,60,40,0.14);
  /* new */
  --done-bg: #f9e8e3;
  --done-color: #c4907a;
  --skip-bg: #fef9e7;
  --skip-color: #b8965a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html{height:100%;background:var(--cream);overscroll-behavior:none;}
body{
  font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);
  height:100%;height:100dvh;max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;overflow:hidden;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;
}

/* HEADER */
.header{
  background:var(--text-dark);color:var(--cream);
  padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;
  flex-shrink:0;box-shadow:0 2px 20px rgba(0,0,0,0.25);z-index:100;
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.app-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;letter-spacing:0.02em;line-height:1;}
.app-title span{font-style:italic;color:var(--blush);}
.header-btns{display:flex;gap:6px;align-items:center;}
.hdr-btn{
  font-size:11px;font-family:'DM Sans',sans-serif;
  padding:5px 12px;border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;background:transparent;color:rgba(255,255,255,0.5);
  cursor:pointer;letter-spacing:0.05em;transition:all 0.15s;
}
.hdr-btn:active{background:rgba(255,255,255,0.12);transform:scale(0.94);}
.hdr-btn.active{background:var(--rose);border-color:var(--rose);color:#fff;}

.day-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:1px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.day-scroll::-webkit-scrollbar{display:none;}
.day-pill{
  flex-shrink:0;padding:5px 13px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.18);background:transparent;
  color:rgba(255,255,255,0.4);cursor:pointer;font-size:11px;
  font-family:'DM Sans',sans-serif;letter-spacing:0.04em;
  transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.day-pill.active{background:var(--rose);border-color:var(--rose);color:#fff;font-weight:500;transform:scale(1.04);}
.day-pill:active{transform:scale(0.92);}

/* SUB HEADER */
.sub-header{background:var(--warm-white);border-bottom:1px solid var(--border);flex-shrink:0;}
.session-bar{display:flex;}
.session-btn{
  flex:1;padding:12px;text-align:center;cursor:pointer;
  font-size:13px;font-family:'DM Sans',sans-serif;letter-spacing:0.04em;
  border:none;background:transparent;color:var(--text-light);
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;
}
.session-btn.active{color:var(--deep-rose);border-bottom-color:var(--rose);font-weight:500;}
.session-btn:active{background:rgba(196,144,122,0.06);}
.progress-row{display:flex;align-items:center;gap:12px;padding:10px 20px 12px;}
.progress-track{flex:1;height:2px;background:var(--blush);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--gold));border-radius:2px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);}
.progress-label{font-size:10px;color:var(--text-light);letter-spacing:0.06em;white-space:nowrap;text-transform:uppercase;}

/* CHECKIN */
.checkin-wrap{background:var(--warm-white);border-bottom:1px solid var(--border);padding:12px 16px;display:none;flex-shrink:0;}
.checkin-wrap.show{display:block;}
.checkin-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400;color:var(--text-dark);margin-bottom:8px;}
.checkin-title span{font-style:italic;color:var(--rose);}
.checkin-options{display:flex;gap:6px;flex-wrap:wrap;}
.checkin-opt{
  padding:6px 13px;border-radius:20px;border:1px solid var(--border);
  background:#fff;color:var(--text-mid);cursor:pointer;font-size:11px;
  font-family:'DM Sans',sans-serif;transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.checkin-opt.selected{background:var(--rose);border-color:var(--rose);color:#fff;font-weight:500;}
.checkin-opt:active{transform:scale(0.93);}
.checkin-note{font-size:11px;color:var(--text-light);margin-top:7px;line-height:1.5;}

/* STACK AREA */
.stack-area{flex:1;overflow:hidden;padding:14px 14px 0;display:flex;flex-direction:column;gap:10px;position:relative;}

/* STEP CARDS */
.step-card{
  background:#fff;border:1px solid var(--border);border-radius:22px;
  overflow:hidden;box-shadow:0 4px 20px var(--shadow-lg);
  transition:all 0.32s cubic-bezier(0.4,0,0.2,1);flex-shrink:0;
}
.step-card.current{box-shadow:0 8px 32px rgba(100,60,40,0.16);border-color:rgba(196,144,122,0.3);}
.step-card.next-1{opacity:0.75;transform:scale(0.97);box-shadow:0 2px 10px var(--shadow);}
.step-card.next-2{opacity:0.45;transform:scale(0.94);box-shadow:0 1px 6px var(--shadow);}
.next-1 .card-badges,.next-2 .card-badges{display:none;}
.next-1 .card-action,.next-2 .card-action{display:none;}
.next-1 .card-product,.next-2 .card-product{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.done-banner{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px 20px;animation:fadeInUp 0.5s ease;
}
.done-banner-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;font-style:italic;color:var(--deep-rose);margin-bottom:8px;}
.done-banner-sub{font-size:11px;color:var(--text-light);letter-spacing:0.08em;text-transform:uppercase;}

.card-top{padding:18px 18px 14px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:background 0.12s;}
.card-top:active{background:rgba(250,247,242,0.8);}
.step-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;font-family:'DM Sans',sans-serif;margin-top:2px;}
.num-am{background:#fff3e0;color:#c47c2a;}
.num-pm{background:#fce4ec;color:#c2185b;}
.num-yoga{background:#fce7f3;color:#9d174d;}
.num-gua{background:#ede9fe;color:#5b21b6;}
.num-device{background:#e3f2fd;color:#1565c0;}
.num-cleanse{background:#f1f8e9;color:#33691e;}
.card-main{flex:1;min-width:0;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--text-dark);line-height:1.2;margin-bottom:3px;letter-spacing:0.01em;}
.current .card-title{font-size:22px;}
.card-product{font-size:11px;color:var(--text-light);line-height:1.4;letter-spacing:0.01em;}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:500;letter-spacing:0.04em;}
.b-device{background:#e3f2fd;color:#1565c0;}
.b-cleanse{background:#f1f8e9;color:#33691e;}
.b-acid{background:#fff8e1;color:#f57f17;}
.b-yoga{background:#fce7f3;color:#9d174d;cursor:pointer;}
.b-gua{background:#ede9fe;color:#5b21b6;cursor:pointer;}
.b-wet{background:#e0f7fa;color:#00695c;}
.b-go{background:#e8f5e9;color:#2e7d32;}
.b-dry{background:#fafafa;color:#757575;border:1px solid #e0e0e0;}
.b-refresh{background:#fff3e0;color:#e65100;}

/* ACTION BUTTONS */
.card-action{padding:0 16px 16px;display:flex;align-items:center;gap:8px;}

.complete-btn{
  flex:1;padding:13px 16px;
  background:var(--done-bg);
  color:var(--done-color);
  border:1.5px solid rgba(196,144,122,0.3);
  border-radius:14px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  letter-spacing:0.04em;cursor:pointer;
  transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.complete-btn:active{transform:scale(0.96);background:#f5d5cc;}

.skip-btn{
  padding:13px 16px;
  background:var(--skip-bg);
  color:var(--skip-color);
  border:1.5px solid rgba(184,150,90,0.3);
  border-radius:14px;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all 0.15s;white-space:nowrap;
  letter-spacing:0.03em;
}
.skip-btn:active{background:#fdf0c0;transform:scale(0.96);}

/* CARD DETAIL */
.card-detail{
  display:none;padding:0 18px 16px;
  font-size:12px;color:var(--text-mid);line-height:1.85;
  letter-spacing:0.01em;border-top:1px solid var(--border);
  padding-top:14px;animation:slideDown 0.18s ease;
}
.card-detail.open{display:block;}

/* ALERT CARDS */
.alert-card{border-radius:16px;padding:13px 16px;font-size:12px;line-height:1.65;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.alert-warn{background:#fff8e1;color:#856404;border:1px solid #ffe08a;}
.alert-info{background:#e8f4fd;color:#0c5460;border:1px solid #bee5eb;}
.alert-success{background:#e8f5e9;color:#155724;border:1px solid #c3e6cb;}
.alert-skin{background:#fdf4ff;color:#6b21a8;border:1px solid #e9d5ff;border-radius:16px;padding:13px 16px;font-size:12px;line-height:1.65;flex-shrink:0;}

/* BOTTOM NAV */
.bottom-nav{
  padding:10px 20px calc(env(safe-area-inset-bottom,0px) + 14px);
  background:var(--warm-white);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.nav-step-info{font-size:11px;color:var(--text-light);letter-spacing:0.04em;}
.nav-step-info strong{color:var(--text-dark);font-weight:500;}
.legend-mini{display:flex;gap:5px;flex-wrap:wrap;}

/* ===================== SKIP REASON SHEET ===================== */
.skip-overlay{
  position:fixed;inset:0;background:rgba(44,36,32,0.5);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:600;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity 0.25s ease;
}
.skip-overlay.open{opacity:1;pointer-events:all;}
.skip-sheet{
  width:100%;max-width:480px;margin:0 auto;
  background:var(--cream);border-radius:24px 24px 0 0;
  padding:0 0 calc(env(safe-area-inset-bottom,0px) + 24px);
  transform:translateY(100%);
  transition:transform 0.32s cubic-bezier(0.32,0.72,0,1);
  box-shadow:0 -4px 30px rgba(0,0,0,0.15);
}
.skip-overlay.open .skip-sheet{transform:translateY(0);}
.skip-handle{width:40px;height:4px;border-radius:2px;background:var(--blush);margin:12px auto 0;}
.skip-header{padding:16px 20px 4px;}
.skip-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--text-dark);}
.skip-title span{font-style:italic;color:var(--rose);}
.skip-step-name{font-size:11px;color:var(--text-light);margin-top:3px;letter-spacing:0.02em;}
.skip-reasons{padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
.skip-reason-btn{
  width:100%;padding:14px 18px;
  background:#fff;border:1px solid var(--border);border-radius:14px;
  font-family:'DM Sans',sans-serif;font-size:13px;
  color:var(--text-mid);cursor:pointer;text-align:left;
  display:flex;align-items:center;gap:12px;
  transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.skip-reason-btn:active{transform:scale(0.97);background:var(--warm-white);}
.skip-reason-btn .reason-emoji{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.skip-cancel{
  margin:4px 16px 0;width:calc(100% - 32px);
  padding:13px;background:transparent;
  border:1px solid var(--border);border-radius:14px;
  font-family:'DM Sans',sans-serif;font-size:12px;
  color:var(--text-light);cursor:pointer;
  transition:all 0.15s;
}
.skip-cancel:active{background:var(--warm-white);}

/* ===================== WEEK TAB ===================== */
.week-view{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 16px 32px;display:none;
  overscroll-behavior:contain;
}
.week-view.show{display:block;}

.week-section{margin-bottom:24px;}
.week-section-title{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;font-weight:400;color:var(--text-dark);
  margin-bottom:12px;padding:0 4px;
}
.week-section-title span{font-style:italic;color:var(--rose);}

/* DAY HEATMAP */
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px;}
.day-cell{
  aspect-ratio:1;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:9px;font-family:'DM Sans',sans-serif;
  letter-spacing:0.04em;font-weight:500;
  border:1px solid var(--border);
  background:var(--warm-white);color:var(--text-light);
  text-transform:uppercase;gap:2px;
}
.day-cell.has-data{border-color:transparent;}
.day-cell.perfect{background:#e8f5e9;color:#2e7d32;}
.day-cell.skipped-some{background:#fff8e1;color:#b8965a;}
.day-cell.skipped-lots{background:#fde8e8;color:#c47a7a;}
.day-cell .day-label{font-size:8px;opacity:0.7;}
.day-cell .day-pct{font-size:11px;font-weight:500;}

/* SKIP LOG */
.skip-log-item{
  background:#fff;border:1px solid var(--border);
  border-radius:14px;padding:12px 14px;
  margin-bottom:8px;
}
.skip-log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.skip-log-step{font-size:12px;font-weight:500;color:var(--text-dark);}
.skip-log-date{font-size:10px;color:var(--text-light);letter-spacing:0.03em;}
.skip-log-reason{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--text-mid);
  background:var(--warm-white);padding:3px 10px;
  border-radius:20px;margin-top:4px;
}

/* INSIGHTS */
.insight-card{
  background:#fff;border:1px solid var(--border);
  border-radius:16px;padding:14px 16px;margin-bottom:10px;
}
.insight-label{font-size:10px;color:var(--rose);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:4px;font-weight:500;}
.insight-text{font-size:13px;color:var(--text-dark);line-height:1.5;}
.insight-text strong{font-weight:500;}

/* SEND TO CLAUDE BTN */
.send-claude-btn{
  width:100%;padding:14px;
  background:var(--text-dark);color:var(--cream);
  border:none;border-radius:16px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  letter-spacing:0.04em;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.18s;margin-top:4px;
}
.send-claude-btn:active{background:var(--deep-rose);transform:scale(0.98);}

.empty-state{text-align:center;padding:32px 20px;color:var(--text-light);}
.empty-state .empty-icon{font-size:36px;margin-bottom:10px;}
.empty-state p{font-size:12px;line-height:1.7;letter-spacing:0.02em;}

/* ===================== YOGA MODAL ===================== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(44,36,32,0.55);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:500;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity 0.28s ease;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-sheet{
  width:100%;max-width:480px;margin:0 auto;
  background:var(--cream);border-radius:26px 26px 0 0;
  max-height:90vh;overflow:hidden;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);
  box-shadow:0 -4px 40px rgba(0,0,0,0.18);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--blush);margin:12px auto 0;flex-shrink:0;}
.modal-header{padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;color:var(--text-dark);}
.modal-title span{font-style:italic;color:var(--rose);}
.modal-close{width:30px;height:30px;border-radius:50%;background:rgba(232,213,196,0.5);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text-mid);transition:all 0.15s;flex-shrink:0;}
.modal-close:active{background:var(--rose);color:#fff;transform:scale(0.9);}
.modal-nav{display:flex;padding:0 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);flex-shrink:0;-webkit-overflow-scrolling:touch;}
.modal-nav::-webkit-scrollbar{display:none;}
.modal-nav-btn{flex-shrink:0;padding:10px 13px;font-size:11px;font-family:'DM Sans',sans-serif;color:var(--text-light);border:none;background:transparent;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;white-space:nowrap;letter-spacing:0.03em;transition:all 0.18s ease;}
.modal-nav-btn.active{color:var(--deep-rose);border-bottom-color:var(--rose);font-weight:500;}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 14px 32px;overscroll-behavior:contain;}
.move-card{background:#fff;border-radius:20px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 16px var(--shadow-lg);}
.move-visual{width:100%;height:160px;background:linear-gradient(135deg,var(--warm-white) 0%,var(--blush) 100%);display:flex;align-items:center;justify-content:center;}
.move-visual-fallback{display:flex;flex-direction:column;align-items:center;gap:10px;}
.move-visual-fallback .icon{font-size:56px;line-height:1;}
.move-visual-fallback p{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-light);}
.move-info{padding:16px 16px 18px;}
.move-name{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;color:var(--text-dark);margin-bottom:2px;}
.move-target{font-size:10px;color:var(--rose);letter-spacing:0.07em;margin-bottom:14px;font-weight:500;text-transform:uppercase;}
.move-steps{font-size:12px;color:var(--text-mid);line-height:1.9;}
.move-steps strong{color:var(--text-dark);font-weight:500;}
.move-tip{margin-top:13px;padding:10px 13px;background:var(--warm-white);border-radius:12px;font-size:11px;color:var(--text-mid);line-height:1.65;border-left:2px solid var(--rose);}
.move-nav{display:flex;gap:9px;margin-top:14px;}
.move-nav-btn{flex:1;padding:12px;border-radius:13px;border:1px solid var(--border);background:#fff;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text-mid);cursor:pointer;transition:all 0.15s;}
.move-nav-btn:active{background:var(--warm-white);transform:scale(0.97);}
.move-nav-btn.primary{background:var(--text-dark);color:#fff;border-color:var(--text-dark);}
.move-nav-btn.primary:active{background:var(--deep-rose);}

@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">My <span>Skin</span> Routine</div>
    <div class="header-btns">
      <button class="hdr-btn" id="week-tab-btn" onclick="toggleWeekView()">Week</button>
      <button class="hdr-btn" onclick="resetAll()">Reset ↺</button>
    </div>
  </div>
  <div class="day-scroll">
    <button class="day-pill active" onclick="setDay('mon',this)">Mon</button>
    <button class="day-pill" onclick="setDay('tue',this)">Tue</button>
    <button class="day-pill" onclick="setDay('wed',this)">Wed</button>
    <button class="day-pill" onclick="setDay('thu',this)">Thu</button>
    <button class="day-pill" onclick="setDay('fri',this)">Fri</button>

const SKIN_NOTES={
  calm:'All clear — carry on with your full routine tonight.',
  flushed:'Skip gua sha tonight. Use a lighter touch and focus on soothing ingredients.',
  dry:'Consider layering an extra pump of moisturizer. Re-spritz toner more generously between steps.',
  sensitive:'Skip retinol if your skin is feeling reactive. Focus on barrier support — niacinamide, ceramides, and PDRN only tonight.'
};

// ===================== ACTIONS =====================
function setSkinState(s){
  skinState=s;
  document.querySelectorAll('.checkin-opt').forEach(b=>b.classList.toggle('selected',b.getAttribute('onclick').includes(`'${s}'`)));
  document.getElementById('checkin-note').textContent=SKIN_NOTES[s]||'';
  render();
}

function key(d,s,i){return d+'_'+s+'_'+i;}
function setDay(d,btn){
  day=d;
  document.querySelectorAll('.day-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setSession(s){
  session=s;
  document.getElementById('btn-am').classList.toggle('active',s==='am');
  document.getElementById('btn-pm').classList.toggle('active',s==='pm');
  document.getElementById('checkin-wrap').classList.toggle('show',s==='pm');
  render();
}
function getSteps(){return session==='am'?AM:(PM[day]||PM.mon);}
function getRealSteps(){return getSteps().filter(s=>!s.alert);}
function getCurrentIndex(){
  const steps=getSteps();
  for(let i=0;i<steps.length;i++){
    if(steps[i].alert)continue;
    if(!checked[key(day,session,i)])return i;
  }
  return -1;
}
function completeStep(i){
  checked[key(day,session,i)]=true;
  if(navigator.vibrate)navigator.vibrate(12);
  render();
}
function openSkipSheet(i,name){
  pendingSkipIndex=i;
  pendingSkipName=name;
  document.getElementById('skip-step-name').textContent=name;
  document.getElementById('skip-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSkipSheet(){
  document.getElementById('skip-overlay').classList.remove('open');
  document.body.style.overflow='';
  pendingSkipIndex=null;
}
function handleSkipOverlayTap(e){
  if(e.target===document.getElementById('skip-overlay'))closeSkipSheet();
}
function confirmSkip(reason){
  if(pendingSkipIndex===null)return;
  // mark as done (skipped)
  checked[key(day,session,pendingSkipIndex)]=true;
  // log the skip
  const log=loadSkipLog();
  const now=new Date();
  log.unshift({
    date:now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}),
    dayKey:day,
    session:session,
    step:pendingSkipName,
    reason:reason,
    ts:now.getTime()
  });
  // keep last 200 entries
  if(log.length>200)log.splice(200);
  saveSkipLog(log);
  closeSkipSheet();
  if(navigator.vibrate)navigator.vibrate([8,40,8]);
  render();
}
function resetAll(){
  getSteps().forEach((_,i)=>{checked[key(day,session,i)]=false;});
  render();
}
function toggleDetail(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('open');
}
function numClass(s,type){
  if(type==='yoga')return 'num-yoga';
  if(type==='gua')return 'num-gua';
  if(type==='device')return 'num-device';
  if(type==='cleanse')return 'num-cleanse';
  return session==='am'?'num-am':'num-pm';
}

// ===================== WEEK VIEW =====================
function toggleWeekView(){
  weekViewOpen=!weekViewOpen;
  document.getElementById('week-tab-btn').classList.toggle('active',weekViewOpen);
  document.getElementById('stack-area').style.display=weekViewOpen?'none':'flex';
  document.getElementById('week-view').classList.toggle('show',weekViewOpen);
  if(weekViewOpen)renderWeekView();
}

function renderWeekView(){
  const log=loadSkipLog();
  const wv=document.getElementById('week-view');

  if(log.length===0){
    wv.innerHTML=`<div class="empty-state"><div class="empty-icon">📊</div><p>No data yet! As you use your routine and skip steps, your patterns will appear here.<br><br>Tap <strong>Skip →</strong> on any step and pick a reason to start tracking.</p></div>`;
    return;
  }

  // Day heatmap — last 7 days
  const dayMap={};
  const now=new Date();
  DAY_KEYS.forEach(dk=>{
    const steps=AM; // approximate total
    const total=getRealStepsForDay(dk);
    const skipped=log.filter(l=>l.dayKey===dk).length;
    dayMap[dk]={skipped, total};
  });

  let heatHtml=`<div class="week-section"><div class="week-section-title">This <span>Week</span></div><div class="day-grid">`;
  DAY_KEYS.forEach(dk=>{
    const {skipped}=dayMap[dk];
    let cls='';
    let pctLabel='—';
    if(skipped===0){cls='perfect';pctLabel='✓';}
    else if(skipped<=2){cls='skipped-some';pctLabel=skipped+'⚠';}
    else{cls='skipped-lots';pctLabel=skipped+'✗';}
    heatHtml+=`<div class="day-cell has-data ${cls}"><span class="day-label">${DAY_LABELS[dk]}</span><span class="day-pct">${pctLabel}</span></div>`;
  });
  heatHtml+=`</div></div>`;

  // Insights
  const reasonCounts={};
  const stepCounts={};
  const dayCounts={};
  log.forEach(l=>{
    reasonCounts[l.reason]=(reasonCounts[l.reason]||0)+1;
    stepCounts[l.step]=(stepCounts[l.step]||0)+1;
    dayCounts[l.dayKey]=(dayCounts[l.dayKey]||0)+1;
  });

  const topReason=Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1])[0];
  const topStep=Object.entries(stepCounts).sort((a,b)=>b[1]-a[1])[0];
  const topDay=Object.entries(dayCounts).sort((a,b)=>b[1]-a[1])[0];

  let insightHtml=`<div class="week-section"><div class="week-section-title">Insights</div>`;
  if(topReason){
    const r=SKIP_REASONS[topReason[0]];
    insightHtml+=`<div class="insight-card"><div class="insight-label">Top Skip Reason</div><div class="insight-text">${r.emoji} <strong>${r.label}</strong> — ${topReason[1]} time${topReason[1]>1?'s':''}</div></div>`;
  }
  if(topStep){
    insightHtml+=`<div class="insight-card"><div class="insight-label">Most Skipped Step</div><div class="insight-text">⚠️ <strong>${topStep[0]}</strong> — skipped ${topStep[1]} time${topStep[1]>1?'s':''}</div></div>`;
  }
  if(topDay){
    insightHtml+=`<div class="insight-card"><div class="insight-label">Hardest Day</div><div class="insight-text">📅 <strong>${DAY_LABELS[topDay[0]]}</strong> has the most skips — ${topDay[1]} total</div></div>`;
  }
  insightHtml+=`</div>`;

  // Recent skip log
  let logHtml=`<div class="week-section"><div class="week-section-title">Skip <span>Log</span></div>`;
  log.slice(0,20).forEach(l=>{
    const r=SKIP_REASONS[l.reason]||{emoji:'•',label:l.reason};
    logHtml+=`<div class="skip-log-item">
      <div class="skip-log-header">
        <div class="skip-log-step">${l.step}</div>
        <div class="skip-log-date">${l.date} · ${l.session==='am'?'☀️':'🌙'}</div>
      </div>
      <span class="skip-log-reason">${r.emoji} ${r.label}</span>
    </div>`;
  });
  logHtml+=`</div>`;

  // Send to Claude button
  const claudeBtn=`<button class="send-claude-btn" onclick="sendToClaude()">✨ Analyze with Claude</button>`;

  wv.innerHTML=heatHtml+insightHtml+logHtml+claudeBtn;
}

function getRealStepsForDay(dk){
  const pmSteps=(PM[dk]||PM.mon).filter(s=>!s.alert).length;
  return AM.filter(s=>!s.alert).length+pmSteps;
}

function sendToClaude(){
  const log=loadSkipLog();
  if(log.length===0){alert('No skip data yet!');return;}
  const summary=log.slice(0,50).map(l=>{
    const r=SKIP_REASONS[l.reason]||{label:l.reason};
    return `${l.date} (${l.session==='am'?'AM':'PM'}, ${DAY_LABELS[l.dayKey]}): skipped "${l.step}" — ${r.label}`;
  }).join('\n');
  const text=`Here's my skincare routine skip log from the past few weeks. Can you analyze the patterns and tell me:\n1. Which steps I skip most and why\n2. Which days I struggle with\n3. Any routine adjustments you'd suggest\n\nSKIP LOG:\n${summary}`;
  navigator.clipboard.writeText(text).then(()=>{
    alert('Copied! Paste it into a new chat with Claude for analysis 🌸');
  }).catch(()=>{
    // fallback: show in a textarea
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.top='0';ta.style.left='0';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    alert('Copied! Paste it into a new chat with Claude for analysis 🌸');
  });
}

// ===================== RENDER =====================
function render(){
  if(weekViewOpen)return;
  const steps=getSteps();
  const real=getRealSteps();
  let done=0;
  real.forEach(s=>{if(checked[key(day,session,steps.indexOf(s))])done++;});
  const pct=real.length?Math.round(done/real.length*100):0;
  document.getElementById('prog-label').textContent=`${done} / ${real.length}`;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';

  const currentIdx=getCurrentIndex();
  const area=document.getElementById('stack-area');

  if(currentIdx===-1&&real.length>0){
    area.innerHTML=`<div class="done-banner"><div class="done-banner-title">Routine complete ✨</div><div class="done-banner-sub">your skin is glowing already</div></div>`;
    document.getElementById('nav-step-info').innerHTML=`<strong>All done!</strong>`;
    return;
  }

  let html='';
  if(session==='pm'&&skinState) html+=`<div class="alert-skin">✨ ${SKIN_NOTES[skinState]}</div>`;

  let shown=0;
  let stepNum=0;
  for(let i=0;i<steps.length;i++){
    if(!steps[i].alert)stepNum++;
    if(i===currentIdx)break;
  }

  for(let i=currentIdx;i<steps.length&&shown<3;i++){
    const s=steps[i];
    if(s.alert){
      if(shown===0){
        const cls={warn:'alert-warn',danger:'alert-danger',info:'alert-info',success:'alert-success'}[s.alert]||'alert-info';
        html+=`<div class="alert-card ${cls}">${s.text}</div>`;
      }
      continue;
    }
    if(checked[key(day,session,i)])continue;

    const cardClass=shown===0?'current':shown===1?'next-1':'next-2';
    const did='d'+i;
    let badges='';
    if(s.type==='device')badges+='<span class="badge b-device">device</span>';
    else if(s.type==='acid')badges+='<span class="badge b-acid">acid night</span>';
    else if(s.type==='cleanse')badges+='<span class="badge b-cleanse">cleanse</span>';
    else if(s.type==='yoga')badges+=`<span class="badge b-yoga" onclick="event.stopPropagation();openYogaModal('${s.yogaId||'cheek-lifter'}')">✨ face yoga — tap to open</span>`;
    else if(s.type==='gua')badges+=`<span class="badge b-gua" onclick="event.stopPropagation();openGuaModal()">💜 gua sha — tap to open</span>`;
    if(s.skin)badges+=sk(s.skin);
    const det=(s.d||'').replace(/\n/g,'<br>');
    const csn=stepNum+shown;

    html+=`<div class="step-card ${cardClass}" id="card-${i}">
      <div class="card-top" onclick="toggleDetail('${did}')">
        <div class="step-num ${numClass(s.skin,s.type)}">${csn}</div>
        <div class="card-main">
          <div class="card-title">${s.t}</div>
          <div class="card-product">${s.p}</div>
          ${badges?`<div class="card-badges">${badges}</div>`:''}
        </div>
      </div>
      <div class="card-detail" id="${did}">${det}</div>
      <div class="card-action">
        <button class="complete-btn" onclick="completeStep(${i})">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3 3 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Done
        </button>
        <button class="skip-btn" onclick="openSkipSheet(${i}, '${s.t.replace(/'/g,"\\'")}')">Skip →</button>
      </div>
    </div>`;
    shown++;
  }

  area.innerHTML=html;
  document.getElementById('nav-step-info').innerHTML=`Step <strong>${stepNum}</strong> of ${real.length}`;
}

// ===================== MODAL =====================
function openYogaModal(startId){
  const idx=MOVES.findIndex(m=>m.id===startId);
  modalMoveIndex=idx>=0?idx:0;
  document.getElementById('modal-title').innerHTML='Face <span>Yoga</span>';
  buildModalNav(MOVES,modalMoveIndex);
  renderModalMove(MOVES[modalMoveIndex]);
  document.getElementById('yoga-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function openGuaModal(){
  document.getElementById('modal-title').innerHTML='Gua <span>Sha</span>';
  document.getElementById('modal-nav').innerHTML='';
  renderModalMove(GUA_STEPS,true);
  document.getElementById('yoga-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('yoga-modal').classList.remove('open');
  document.body.style.overflow='';
}
function handleModalTap(e){if(e.target===document.getElementById('yoga-modal'))closeModal();}
function buildModalNav(moves,activeIdx){
  document.getElementById('modal-nav').innerHTML=moves.map((m,i)=>`<button class="modal-nav-btn${i===activeIdx?' active':''}" onclick="navToMove(${i})">${m.name.split(' ')[0]}</button>`).join('');
}
function navToMove(idx){
  modalMoveIndex=idx;
  buildModalNav(MOVES,idx);
  renderModalMove(MOVES[idx]);
  const btns=document.querySelectorAll('.modal-nav-btn');
  if(btns[idx])btns[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
function renderModalMove(move,isGua=false){
  const prev=!isGua&&modalMoveIndex>0?`<button class="move-nav-btn" onclick="navToMove(${modalMoveIndex-1})">← ${MOVES[modalMoveIndex-1].name.split(' ')[0]}</button>`:'<div></div>';
  const next=!isGua&&modalMoveIndex<MOVES.length-1?`<button class="move-nav-btn primary" onclick="navToMove(${modalMoveIndex+1})">${MOVES[modalMoveIndex+1].name.split(' ')[0]} →</button>`:'<div></div>';
  document.getElementById('modal-body').innerHTML=`
    <div class="move-card">
      <div class="move-visual"><div class="move-visual-fallback"><div class="icon">${move.emoji}</div><p>${move.duration}</p></div></div>
      <div class="move-info">
        <div class="move-name">${move.name}</div>
        <div class="move-target">${move.target}</div>
        <div class="move-steps">${move.steps}</div>
        <div class="move-tip">💡 ${move.tip}</div>
      </div>
    </div>
    ${!isGua?`<div class="move-nav">${prev}${next}</div>`:''}`;
}

render();
</script>
</body>
</html>
