<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Routine ✨">
<title>My Skincare Routine</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #faf7f2;
  --warm-white: #f5f0e8;
  --blush: #e8d5c4;
  --rose: #c4907a;
  --deep-rose: #a06b58;
  --sage: #7a8c7a;
  --gold: #b8965a;
  --text-dark: #2c2420;
  --text-mid: #5a4a42;
  --text-light: #9a8a82;
  --border: rgba(180,150,130,0.18);
  --shadow: rgba(100,60,40,0.07);
  --shadow-lg: rgba(100,60,40,0.12);
}

/* RESET + BASE */
*{box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}
html{
  height:100%;
  background:var(--cream);
  /* kill rubber-band on html level */
  overscroll-behavior:none;
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--text-dark);
  min-height:100%;
  min-height:100dvh;
  max-width:480px;
  margin:0 auto;
  padding-bottom:48px;
  -webkit-font-smoothing:antialiased;
  /* prevent overscroll bounce on body */
  overscroll-behavior-y:none;
  position:relative;
}

/* HEADER */
.header{
  background:var(--text-dark);
  color:var(--cream);
  padding:env(safe-area-inset-top, 0px) 20px 16px;
  padding-top:calc(env(safe-area-inset-top, 0px) + 16px);
  position:sticky;
  top:0;
  z-index:100;
  /* subtle bottom shadow to float above content */
  box-shadow:0 2px 20px rgba(0,0,0,0.25);
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.app-title{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;font-weight:300;
  letter-spacing:0.02em;line-height:1;
}
.app-title span{font-style:italic;color:var(--blush);}
.header-btns{display:flex;gap:6px;align-items:center;}
.reset-btn{
  font-size:11px;font-family:'DM Sans',sans-serif;
  padding:6px 13px;border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;background:transparent;color:rgba(255,255,255,0.55);
  cursor:pointer;letter-spacing:0.05em;white-space:nowrap;
  transition:background 0.15s,transform 0.1s;
}
.reset-btn:active{background:rgba(255,255,255,0.12);transform:scale(0.94);}
.quick-btn{
  font-size:11px;font-family:'DM Sans',sans-serif;
  padding:6px 13px;border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;background:transparent;color:rgba(255,255,255,0.55);
  cursor:pointer;letter-spacing:0.05em;white-space:nowrap;
  transition:all 0.2s;
}
.quick-btn.active{background:var(--rose);border-color:var(--rose);color:#fff;}
.quick-btn:active{transform:scale(0.94);}

/* DAY SCROLL */
.day-scroll{
  display:flex;gap:6px;
  overflow-x:auto;padding-bottom:2px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
}
.day-scroll::-webkit-scrollbar{display:none;}
.day-pill{
  flex-shrink:0;padding:6px 15px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.18);background:transparent;
  color:rgba(255,255,255,0.45);cursor:pointer;font-size:12px;
  font-family:'DM Sans',sans-serif;letter-spacing:0.04em;
  transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  scroll-snap-align:start;
}
.day-pill.active{
  background:var(--rose);border-color:var(--rose);
  color:#fff;font-weight:500;
  transform:scale(1.04);
}
.day-pill:active{transform:scale(0.92);}

/* SESSION BAR */
.session-bar{
  display:flex;
  background:var(--warm-white);
  border-bottom:1px solid var(--border);
}
.session-btn{
  flex:1;padding:14px;text-align:center;cursor:pointer;
  font-size:13px;font-family:'DM Sans',sans-serif;letter-spacing:0.04em;
  border:none;background:transparent;color:var(--text-light);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all 0.2s ease;
  position:relative;
}
.session-btn.active{
  color:var(--deep-rose);
  border-bottom-color:var(--rose);
  font-weight:500;
}
.session-btn:active::after{
  content:'';position:absolute;inset:0;
  background:rgba(196,144,122,0.07);border-radius:4px;
}

/* SKIN CHECK-IN */
.checkin-wrap{
  background:var(--warm-white);
  border-bottom:1px solid var(--border);
  padding:14px 16px;
  display:none;
  animation:slideDown 0.22s ease;
}
.checkin-wrap.show{display:block;}
.checkin-title{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;font-weight:400;color:var(--text-dark);
  margin-bottom:10px;
}
.checkin-title span{font-style:italic;color:var(--rose);}
.checkin-options{display:flex;gap:6px;flex-wrap:wrap;}
.checkin-opt{
  padding:7px 14px;border-radius:20px;
  border:1px solid var(--border);background:#fff;
  color:var(--text-mid);cursor:pointer;font-size:12px;
  font-family:'DM Sans',sans-serif;letter-spacing:0.03em;
  transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.checkin-opt.selected{background:var(--rose);border-color:var(--rose);color:#fff;font-weight:500;}
.checkin-opt:active{transform:scale(0.93);}
.checkin-note{font-size:11px;color:var(--text-light);margin-top:8px;line-height:1.5;}

/* DAY INFO */
.day-info{
  padding:16px 20px 4px;
  background:var(--warm-white);
}
.day-name{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;font-weight:400;color:var(--text-dark);
  line-height:1.1;
}
.day-sub{font-size:11px;color:var(--text-light);letter-spacing:0.04em;margin-top:3px;}

/* PROGRESS */
.progress-wrap{padding:12px 20px 14px;background:var(--warm-white);}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.progress-label{font-size:10px;color:var(--text-light);letter-spacing:0.06em;text-transform:uppercase;}
.progress-pct{font-size:11px;color:var(--rose);font-weight:500;letter-spacing:0.02em;}
.progress-track{height:2px;background:var(--blush);border-radius:2px;overflow:hidden;}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--rose),var(--gold));
  border-radius:2px;
  transition:width 0.55s cubic-bezier(0.4,0,0.2,1);
}

/* LEGEND */
.legend{
  display:flex;gap:7px;flex-wrap:wrap;
  padding:9px 20px 10px;background:var(--warm-white);
  border-bottom:1px solid var(--border);
}

/* STEPS AREA — smooth fade transition */
.steps-wrap{
  padding:14px 14px 0;
  animation:fadeIn 0.22s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

/* STEP CARD */
.step-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  margin-bottom:9px;
  overflow:hidden;
  box-shadow:0 1px 6px var(--shadow), 0 4px 16px rgba(100,60,40,0.04);
  transition:opacity 0.3s ease, box-shadow 0.15s ease;
  /* GPU layer for smooth transforms */
  will-change:transform;
  transform:translateZ(0);
}
.step-card:active{
  box-shadow:0 1px 3px var(--shadow);
}
.step-card.done-card{opacity:0.42;}

.step-header{
  display:flex;align-items:center;gap:12px;
  padding:13px 13px;
  cursor:pointer;
  /* active state via pseudo */
  position:relative;
  transition:background 0.12s;
}
.step-header:active{background:rgba(250,247,242,0.8);}

.step-num{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:500;flex-shrink:0;
  font-family:'DM Sans',sans-serif;
  letter-spacing:0;
}
.num-am{background:#fff3e0;color:#c47c2a;}
.num-pm{background:#fce4ec;color:#c2185b;}
.num-yoga{background:#fce7f3;color:#9d174d;}
.num-gua{background:#ede9fe;color:#5b21b6;}
.num-device{background:#e3f2fd;color:#1565c0;}
.num-cleanse{background:#f1f8e9;color:#33691e;}

.step-main{flex:1;min-width:0;}
.step-title{
  font-size:13px;font-weight:500;
  color:var(--text-dark);
  margin-bottom:2px;line-height:1.3;
  letter-spacing:-0.01em;
}
.step-product{
  font-size:11px;color:var(--text-light);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:0.01em;
}

/* quick mode */
.quick-mode .step-product{display:none;}
.quick-mode .step-badges{display:none!important;}
.quick-mode .step-detail{display:none!important;}
.quick-mode .step-header{cursor:default;}
.quick-mode .step-card{border-radius:14px;margin-bottom:7px;}
.quick-mode .step-num{width:26px;height:26px;font-size:10px;}
.quick-mode .step-title{font-size:13px;}

.step-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.badge{
  display:inline-block;padding:2px 8px;border-radius:8px;
  font-size:9px;font-weight:500;letter-spacing:0.04em;
}
.b-am{background:#fff3e0;color:#c47c2a;}
.b-pm{background:#fce4ec;color:#c2185b;}
.b-device{background:#e3f2fd;color:#1565c0;}
.b-cleanse{background:#f1f8e9;color:#33691e;}
.b-acid{background:#fff8e1;color:#f57f17;}
.b-yoga{background:#fce7f3;color:#9d174d;cursor:pointer;}
.b-gua{background:#ede9fe;color:#5b21b6;cursor:pointer;}
.b-wet{background:#e0f7fa;color:#00695c;}
.b-go{background:#e8f5e9;color:#2e7d32;}
.b-dry{background:#fafafa;color:#757575;border:1px solid #e0e0e0;}
.b-refresh{background:#fff3e0;color:#e65100;}

/* CHECK BUTTON — spring bounce */
.step-check{
  width:28px;height:28px;border-radius:50%;
  border:1.5px solid var(--blush);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;
  transition:all 0.28s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
  background:#fff;
}
.step-check.done{
  background:var(--sage);
  border-color:var(--sage);
  transform:scale(1.08);
  box-shadow:0 2px 8px rgba(122,140,122,0.3);
}
.step-check:active{transform:scale(0.82)!important;}

/* ripple on check */
.step-check::after{
  content:'';position:absolute;
  width:100%;height:100%;border-radius:50%;
  background:var(--sage);opacity:0;transform:scale(1);
}
.step-check.just-checked::after{animation:ripple 0.45s ease-out forwards;}
@keyframes ripple{
  0%{opacity:0.35;transform:scale(1);}
  100%{opacity:0;transform:scale(2.4);}
}
.check-svg{
  opacity:0;transform:scale(0.4) rotate(-20deg);
  transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.step-check.done .check-svg{opacity:1;transform:scale(1) rotate(0deg);}

/* STEP DETAIL */
.step-detail{
  display:none;
  padding:11px 13px 14px;
  font-size:11.5px;color:var(--text-mid);
  line-height:1.85;
  border-top:1px solid var(--border);
  letter-spacing:0.01em;
}
.step-detail.open{
  display:block;
  animation:slideDown 0.18s ease;
}

/* ALERTS */
.alert{
  border-radius:14px;padding:11px 14px;
  font-size:12px;line-height:1.65;margin-bottom:9px;
  font-family:'DM Sans',sans-serif;letter-spacing:0.01em;
}
.alert-warn{background:#fff8e1;color:#856404;border:1px solid #ffe08a;}
.alert-info{background:#e8f4fd;color:#0c5460;border:1px solid #bee5eb;}
.alert-success{background:#e8f5e9;color:#155724;border:1px solid #c3e6cb;}
.alert-danger{background:#fde8e8;color:#721c24;border:1px solid #f5c6cb;}
.alert-skin{
  border-radius:14px;padding:11px 14px;
  font-size:12px;line-height:1.65;margin-bottom:9px;
  background:#fdf4ff;color:#6b21a8;border:1px solid #e9d5ff;
}

/* DONE BANNER */
.done-banner{
  text-align:center;padding:32px 20px;
  font-family:'Cormorant Garamond',serif;
  font-size:26px;font-weight:300;font-style:italic;
  color:var(--deep-rose);
  animation:fadeIn 0.5s ease;
}
.done-banner small{
  display:block;font-family:'DM Sans',sans-serif;
  font-style:normal;font-size:11px;
  color:var(--text-light);margin-top:6px;letter-spacing:0.06em;
  text-transform:uppercase;
}

/* MODAL — native sheet */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(44,36,32,0.55);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:500;
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;
  transition:opacity 0.28s ease;
}
.modal-overlay.open{opacity:1;pointer-events:all;}

.modal-sheet{
  width:100%;max-width:480px;margin:0 auto;
  background:var(--cream);
  border-radius:26px 26px 0 0;
  max-height:90vh;
  overflow:hidden;
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);
  box-shadow:0 -4px 40px rgba(0,0,0,0.18);
  padding-bottom:env(safe-area-inset-bottom, 0px);
}
.modal-overlay.open .modal-sheet{transform:translateY(0);}

.modal-handle{
  width:40px;height:4px;border-radius:2px;
  background:var(--blush);margin:12px auto 0;flex-shrink:0;
}
.modal-header{
  padding:14px 20px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.modal-title{
  font-family:'Cormorant Garamond',serif;
  font-size:21px;font-weight:400;color:var(--text-dark);
}
.modal-title span{font-style:italic;color:var(--rose);}
.modal-close{
  width:30px;height:30px;border-radius:50%;
  background:rgba(232,213,196,0.5);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;color:var(--text-mid);
  transition:all 0.15s;flex-shrink:0;
}
.modal-close:active{background:var(--rose);color:#fff;transform:scale(0.9);}

.modal-nav{
  display:flex;padding:0 16px;
  overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--border);flex-shrink:0;
  -webkit-overflow-scrolling:touch;
}
.modal-nav::-webkit-scrollbar{display:none;}
.modal-nav-btn{
  flex-shrink:0;padding:10px 13px;
  font-size:11px;font-family:'DM Sans',sans-serif;
  color:var(--text-light);border:none;background:transparent;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  cursor:pointer;white-space:nowrap;letter-spacing:0.03em;
  transition:all 0.18s ease;
}
.modal-nav-btn.active{color:var(--deep-rose);border-bottom-color:var(--rose);font-weight:500;}
.modal-nav-btn:active{opacity:0.7;}

.modal-body{
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:18px 14px 32px;
  overscroll-behavior:contain;
}

.move-card{
  background:#fff;border-radius:20px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:0 2px 16px var(--shadow-lg);
}
.move-visual{
  width:100%;height:176px;
  background:linear-gradient(135deg,var(--warm-white) 0%,var(--blush) 100%);
  display:flex;align-items:center;justify-content:center;
}
.move-visual-fallback{
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.move-visual-fallback .icon{font-size:60px;line-height:1;}
.move-visual-fallback p{
  font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text-light);font-family:'DM Sans',sans-serif;
}
.move-info{padding:16px 16px 18px;}
.move-name{
  font-family:'Cormorant Garamond',serif;
  font-size:21px;font-weight:400;color:var(--text-dark);margin-bottom:2px;
}
.move-target{
  font-size:10px;color:var(--rose);
  letter-spacing:0.07em;margin-bottom:14px;
  font-weight:500;text-transform:uppercase;
}
.move-steps{font-size:12px;color:var(--text-mid);line-height:1.9;}
.move-steps strong{color:var(--text-dark);font-weight:500;}
.move-tip{
  margin-top:13px;padding:10px 13px;
  background:var(--warm-white);border-radius:12px;
  font-size:11px;color:var(--text-mid);line-height:1.65;
  border-left:2px solid var(--rose);
}
.move-nav{display:flex;gap:9px;margin-top:14px;}
.move-nav-btn{
  flex:1;padding:12px;border-radius:13px;
  border:1px solid var(--border);background:#fff;
  font-size:12px;font-family:'DM Sans',sans-serif;
  color:var(--text-mid);cursor:pointer;
  transition:all 0.15s;letter-spacing:0.02em;
}
.move-nav-btn:active{background:var(--warm-white);transform:scale(0.97);}
.move-nav-btn.primary{
  background:var(--text-dark);color:#fff;border-color:var(--text-dark);
}
.move-nav-btn.primary:active{background:var(--deep-rose);border-color:var(--deep-rose);}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">My <span>Skin</span> Routine</div>
    <div class="header-btns">
      <button class="quick-btn" id="quick-btn" onclick="toggleQuickMode()">Quick</button>
      <button class="reset-btn" onclick="resetAll()">Reset ↺</button>
    </div>
  </div>
  <div class="day-scroll">
    <button class="day-pill active" onclick="setDay('mon',this)">Mon</button>
    <button class="day-pill" onclick="setDay('tue',this)">Tue</button>
    <button class="day-pill" onclick="setDay('wed',this)">Wed</button>
    <button class="day-pill" onclick="setDay('thu',this)">Thu</button>
    <button class="day-pill" onclick="setDay('fri',this)">Fri</button>
    <button class="day-pill" onclick="setDay('sat',this)">Sat</button>
    <button class="day-pill" onclick="setDay('sun',this)">Sun</button>
  </div>
</div>

<div class="session-bar">
  <button class="session-btn active" id="btn-am" onclick="setSession('am')">☀️ Morning</button>
  <button class="session-btn" id="btn-pm" onclick="setSession('pm')">🌙 Evening</button>
</div>

<div class="checkin-wrap" id="checkin-wrap">
  <div class="checkin-title">How's your skin feeling <span>right now?</span></div>
  <div class="checkin-options">
    <button class="checkin-opt" onclick="setSkinState('calm')">😌 Calm</button>
    <button class="checkin-opt" onclick="setSkinState('flushed')">🌹 Flushed</button>
    <button class="checkin-opt" onclick="setSkinState('dry')">🏜️ Dry</button>
    <button class="checkin-opt" onclick="setSkinState('sensitive')">🌸 Sensitive</button>
  </div>
  <div class="checkin-note" id="checkin-note"></div>
</div>

<div class="day-info">
  <div class="day-name" id="day-name">Monday</div>
  <div class="day-sub" id="day-sub">Air Shot · Peptide · GF · Gua Sha</div>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span class="progress-label" id="prog-label">0 OF 0 STEPS</span>
    <span class="progress-pct" id="prog-pct">0%</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="legend">
  <div class="leg-item"><span class="badge b-wet">💧 wet</span></div>
  <div class="leg-item"><span class="badge b-go">✅ go</span></div>
  <div class="leg-item"><span class="badge b-dry">○ dry</span></div>
  <div class="leg-item"><span class="badge b-refresh">🔄 refresh</span></div>
  <div class="leg-item"><span class="badge b-yoga">face yoga</span></div>
  <div class="leg-item"><span class="badge b-gua">gua sha</span></div>
  <div class="leg-item"><span class="badge b-device">device</span></div>
</div>

<div class="steps-wrap" id="steps-wrap"></div>

<div class="modal-overlay" id="yoga-modal" onclick="handleModalTap(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Face <span>Yoga</span></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-nav" id="modal-nav"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const DAYS={
  mon:{name:'Monday',sub:'Air Shot · Peptide · GF · Gua Sha'},

let day='mon',session='am',checked={},quickMode=false,skinState=null,modalMoveIndex=0;

const SKIN_NOTES={
  calm:'All clear — carry on with your full routine tonight.',
  flushed:'Skip gua sha tonight. Use a lighter touch and focus on soothing ingredients.',
  dry:'Consider layering an extra pump of moisturizer. Re-spritz toner more generously between steps.',
  sensitive:'Skip retinol if your skin is feeling reactive. Focus on barrier support — niacinamide, ceramides, and PDRN only tonight.'
};

function setSkinState(s){
  skinState=s;
  document.querySelectorAll('.checkin-opt').forEach(b=>b.classList.toggle('selected',b.getAttribute('onclick').includes(`'${s}'`)));
  document.getElementById('checkin-note').textContent=SKIN_NOTES[s]||'';
}

function toggleQuickMode(){
  quickMode=!quickMode;
  document.getElementById('quick-btn').classList.toggle('active',quickMode);
  document.getElementById('steps-wrap').classList.toggle('quick-mode',quickMode);
}

function key(d,s,i){return d+'_'+s+'_'+i;}

function setDay(d,btn){
  day=d;
  document.querySelectorAll('.day-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('day-name').textContent=DAYS[d].name;
  document.getElementById('day-sub').textContent=DAYS[d].sub;
  render();
}

function setSession(s){
  session=s;
  document.getElementById('btn-am').classList.toggle('active',s==='am');
  document.getElementById('btn-pm').classList.toggle('active',s==='pm');
  document.getElementById('checkin-wrap').classList.toggle('show',s==='pm');
  render();
}

function getSteps(){return session==='am'?AM:(PM[day]||PM.mon);}

function toggleCheck(i,e){
  e.stopPropagation();
  const k=key(day,session,i);
  const wasChecked=checked[k];
  checked[k]=!wasChecked;
  const btn=e.currentTarget;
  if(!wasChecked){
    btn.classList.add('just-checked');
    setTimeout(()=>btn.classList.remove('just-checked'),500);
    if(navigator.vibrate) navigator.vibrate(10);
  }
  render();
}

function toggleDetail(id){
  if(quickMode)return;
  const el=document.getElementById(id);
  if(el)el.classList.toggle('open');
}

function resetAll(){
  getSteps().forEach((_,i)=>{checked[key(day,session,i)]=false;});
  render();
}

function numClass(s,type){
  if(type==='yoga')return 'num-yoga';
  if(type==='gua')return 'num-gua';
  if(type==='device')return 'num-device';
  if(type==='cleanse')return 'num-cleanse';
  return session==='am'?'num-am':'num-pm';
}

function openYogaModal(startId){
  const idx=MOVES.findIndex(m=>m.id===startId);
  modalMoveIndex=idx>=0?idx:0;
  document.getElementById('modal-title').innerHTML='Face <span>Yoga</span>';
  buildModalNav(MOVES,modalMoveIndex);
  renderModalMove(MOVES[modalMoveIndex]);
  document.getElementById('yoga-modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function openGuaModal(){
  document.getElementById('modal-title').innerHTML='Gua <span>Sha</span>';
  document.getElementById('modal-nav').innerHTML='';
  renderModalMove(GUA_STEPS,true);
  document.getElementById('yoga-modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('yoga-modal').classList.remove('open');
  document.body.style.overflow='';
}

function handleModalTap(e){
  if(e.target===document.getElementById('yoga-modal'))closeModal();
}

function buildModalNav(moves,activeIdx){
  document.getElementById('modal-nav').innerHTML=moves.map((m,i)=>`<button class="modal-nav-btn${i===activeIdx?' active':''}" onclick="navToMove(${i})">${m.name.split(' ')[0]}</button>`).join('');
}

function navToMove(idx){
  modalMoveIndex=idx;
  buildModalNav(MOVES,idx);
  renderModalMove(MOVES[idx]);
  const btns=document.querySelectorAll('.modal-nav-btn');
  if(btns[idx])btns[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function renderModalMove(move,isGua=false){
  const prev=!isGua&&modalMoveIndex>0?`<button class="move-nav-btn" onclick="navToMove(${modalMoveIndex-1})">← ${MOVES[modalMoveIndex-1].name.split(' ')[0]}</button>`:'<div></div>';
  const next=!isGua&&modalMoveIndex<MOVES.length-1?`<button class="move-nav-btn primary" onclick="navToMove(${modalMoveIndex+1})">${MOVES[modalMoveIndex+1].name.split(' ')[0]} →</button>`:'<div></div>';
  document.getElementById('modal-body').innerHTML=`
    <div class="move-card">
      <div class="move-visual"><div class="move-visual-fallback"><div class="icon">${move.emoji}</div><p>${move.duration}</p></div></div>
      <div class="move-info">
        <div class="move-name">${move.name}</div>
        <div class="move-target">${move.target}</div>
        <div class="move-steps">${move.steps}</div>
        <div class="move-tip">💡 ${move.tip}</div>
      </div>
    </div>
    ${!isGua?`<div class="move-nav">${prev}${next}</div>`:''}`;
}

function render(){
  const steps=getSteps();
  const real=steps.filter(s=>!s.alert);
  let done=0;
  real.forEach(s=>{if(checked[key(day,session,steps.indexOf(s))])done++;});
  const pct=real.length?Math.round(done/real.length*100):0;
  document.getElementById('prog-label').textContent=done+' OF '+real.length+' STEPS';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';

  let html='';
  if(session==='pm'&&skinState)html+=`<div class="alert alert-skin">✨ ${SKIN_NOTES[skinState]}</div>`;
  if(pct===100&&real.length>0)html+=`<div class="done-banner">Routine complete ✨<small>your skin is glowing</small></div>`;

  let idx=0;
  steps.forEach((s,i)=>{
    if(s.alert){
      const cls={warn:'alert-warn',danger:'alert-danger',info:'alert-info',success:'alert-success'}[s.alert]||'alert-info';
      html+=`<div class="alert ${cls}">${s.text}</div>`;return;
    }
    const k=key(day,session,i);
    const isDone=!!checked[k];
    const did='d'+i;idx++;
    let badges='';
    if(s.type==='device')badges+='<span class="badge b-device">device</span>';
    else if(s.type==='acid')badges+='<span class="badge b-acid">acid night</span>';
    else if(s.type==='cleanse')badges+='<span class="badge b-cleanse">cleanse</span>';
    else if(s.type==='yoga')badges+=`<span class="badge b-yoga" onclick="event.stopPropagation();openYogaModal('${s.yogaId||'cheek-lifter'}')">✨ face yoga — tap to open</span>`;
    else if(s.type==='gua')badges+=`<span class="badge b-gua" onclick="event.stopPropagation();openGuaModal()">💜 gua sha — tap to open</span>`;
    if(s.skin)badges+=sk(s.skin);
    const det=(s.d||'').replace(/\n/g,'<br>');
    html+=`<div class="step-card${isDone?' done-card':''}">
      <div class="step-header" onclick="toggleDetail('${did}')">
        <div class="step-num ${numClass(s.skin,s.type)}">${idx}</div>
        <div class="step-main">
          <div class="step-title">${s.t}</div>
          <div class="step-product">${s.p}</div>
          ${badges?`<div class="step-badges">${badges}</div>`:''}
        </div>
        <div class="step-check${isDone?' done':''}" onclick="toggleCheck(${i},event)">
          ${isDone?`<svg class="check-svg" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
        </div>
      </div>
      <div class="step-detail" id="${did}">${det}</div>
    </div>`;
  });
  document.getElementById('steps-wrap').innerHTML=html;
}

render();
</script>
</body>
</html>
